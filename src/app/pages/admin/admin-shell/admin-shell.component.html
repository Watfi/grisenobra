<div class="min-h-screen flex bg-gris-warm">
  <!-- Sidebar -->
  <aside class="w-56 bg-gris-dark text-white flex flex-col py-8 px-5 fixed h-full">
    <h2 class="font-serif text-xl lowercase tracking-widest mb-10">gris en obra</h2>
    <p class="text-xs text-white/30 lowercase tracking-widest mb-6">admin</p>

    <nav class="flex flex-col gap-2 text-sm lowercase tracking-widest flex-1">
      <a routerLink="/admin/projects" routerLinkActive="text-gris-accent"
         class="text-white/60 hover:text-white transition-colors py-2">
        proyectos
      </a>
      <a routerLink="/admin/content" routerLinkActive="text-gris-accent"
         class="text-white/60 hover:text-white transition-colors py-2">
        contenido
      </a>
      <a routerLink="/admin/contacts" routerLinkActive="text-gris-accent"
         class="text-white/60 hover:text-white transition-colors py-2">
        consultas
      </a>
      <a routerLink="/" class="text-white/40 hover:text-white/70 transition-colors py-2 mt-4">
        ver sitio ↗
      </a>
    </nav>

    <button
      (click)="logout()"
      class="text-xs text-white/30 lowercase tracking-widest hover:text-white/60 transition-colors text-left"
    >
      cerrar sesión
    </button>
  </aside>

  <!-- Main content -->
  <main class="flex-1 ml-56 p-8">
    <router-outlet />
  </main>
</div>
