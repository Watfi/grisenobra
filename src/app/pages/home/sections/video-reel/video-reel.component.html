<section class="relative bg-gris-dark overflow-hidden">

  <!-- 4 video columns -->
  <div class="flex gap-4 h-[700px] items-start justify-center overflow-hidden px-4 py-8">

    <!-- Col 1: down 30s -->
    <div class="flex flex-col gap-4 animate-infinite-scroll shrink-0" style="animation-duration: 30s;">
      @for (v of col1; track $index) {
        <div class="w-44 md:w-52 lg:w-60 aspect-9/16 rounded-lg overflow-hidden bg-neutral-900 shrink-0">
          <video [src]="v" autoplay muted [muted]="true" loop playsinline preload="metadata" class="w-full h-full object-cover"></video>
        </div>
      }
    </div>

    <!-- Col 2: up 20s -->
    <div class="flex flex-col gap-4 animate-infinite-scroll shrink-0"
         style="animation-direction: reverse; animation-duration: 24s;">
      @for (v of col2; track $index) {
        <div class="w-44 md:w-52 lg:w-60 aspect-9/16 rounded-lg overflow-hidden bg-neutral-900 shrink-0">
          <video [src]="v" autoplay muted [muted]="true" loop playsinline preload="metadata" class="w-full h-full object-cover"></video>
        </div>
      }
    </div>

    <!-- Col 3: down 30s (hidden on mobile) -->
    <div class="hidden md:flex flex-col gap-4 animate-infinite-scroll shrink-0"
         style="animation-duration: 36s;">
      @for (v of col3; track $index) {
        <div class="w-44 md:w-52 lg:w-60 aspect-9/16 rounded-lg overflow-hidden bg-neutral-900 shrink-0">
          <video [src]="v" autoplay muted [muted]="true" loop playsinline preload="metadata" class="w-full h-full object-cover"></video>
        </div>
      }
    </div>

    <!-- Col 4: up 22s (hidden on mobile) -->
    <div class="hidden md:flex flex-col gap-4 animate-infinite-scroll shrink-0"
         style="animation-direction: reverse; animation-duration: 26s;">
      @for (v of col4; track $index) {
        <div class="w-44 md:w-52 lg:w-60 aspect-9/16 rounded-lg overflow-hidden bg-neutral-900 shrink-0">
          <video [src]="v" autoplay muted [muted]="true" loop playsinline preload="metadata" class="w-full h-full object-cover"></video>
        </div>
      }
    </div>

  </div>

  <!-- Glassmorphism centered card (over the columns) -->
  <div class="absolute inset-0 flex items-center justify-center z-10 pointer-events-none">
    <div class="text-center text-white px-12 py-10 rounded-sm pointer-events-auto"
         style="background: rgba(26,26,26,0.55); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 1px solid rgba(255,255,255,0.08);">
      <p class="text-gris-accent tracking-[0.3em] uppercase text-xs mb-5">Inmersión visual</p>
      <h2 class="font-serif text-4xl md:text-5xl mb-3">El Proceso en Movimiento</h2>
      <p class="text-white/50 tracking-[0.15em] uppercase text-xs mb-8">Detrás de cámaras de nuestras obras</p>
      <a routerLink="/proyectos"
         class="inline-block px-8 py-3 border border-white/30 text-xs uppercase tracking-[0.3em] text-white hover:bg-gris-accent hover:border-gris-accent transition-all duration-300">
        Ver ahora
      </a>
    </div>
  </div>

</section>
